# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/huimiu/foundry-azure-yaml/schemas/v1.0/azure.yaml.json

# OLD (deprecated) shape — for testing the migration / deprecation warning.
#
# Here the agent definition is nested under `config:` instead of being direct
# service-level properties. azd still loads this during the deprecation window
# but prints a warning pointing at the migration guide.
#
# Bug-bash check: run an azd command against this file (e.g. `azd provision` or
# `azd package`) and confirm you get a clear deprecation warning — not a crash.
name: foundry-migration-before

services:
  my-agent:
    host: azure.ai.agent
    project: ./agents/assistant
    config:
      kind: hosted
      name: my-agent
      description: Old-style agent defined under config.
